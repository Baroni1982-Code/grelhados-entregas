<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validador de Entregas – Os Grelhados dos Reis</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 1.5rem 1rem; }
  .app { background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .logo-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 4px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .brand { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .subtitle { font-size: 12px; color: #888; }
  .store-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 9px 4px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 12px; color: #888; cursor: pointer; text-align: center; line-height: 1.3; transition: all 0.15s; }
  .tab.active { border: 2px solid #E67817; color: #E67817; font-weight: 600; }
  .tab:hover:not(.active) { background: #f9f9f9; }
  .scard { background: #f9f9f9; border-radius: 8px; padding: 10px 14px; margin-bottom: 1.25rem; font-size: 12px; color: #666; line-height: 1.7; }
  .scard strong { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 11px; margin-left: 6px; }
  .open { background: #eaf3de; color: #3B6D11; }
  .closed { background: #FCEBEB; color: #A32D2D; }
  .field-label { font-size: 13px; color: #666; margin-bottom: 6px; display: block; }
  .input-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .addr { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #1a1a1a; outline: none; }
  .addr:focus { border-color: #E67817; box-shadow: 0 0 0 2px rgba(230,120,23,0.15); }
  .btn { padding: 10px 16px; background: #E67817; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .result { border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .r-ok { background: #eaf3de; border: 1px solid #C0DD97; }
  .r-no { background: #FCEBEB; border: 1px solid #F7C1C1; }
  .r-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .r-ok .r-title { color: #3B6D11; }
  .r-no .r-title { color: #A32D2D; }
  .r-sub { font-size: 12px; color: #666; margin-bottom: 12px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .stat { background: #fff; border-radius: 8px; padding: 9px 10px; border: 1px solid #eee; }
  .slabel { font-size: 11px; color: #888; margin-bottom: 2px; }
  .sval { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .fee-row { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 8px; padding: 9px 12px; border: 1px solid #eee; margin-bottom: 10px; }
  .fee-l { font-size: 13px; color: #666; }
  .fee-v { font-size: 16px; font-weight: 600; color: #E67817; }
  .rnote { font-size: 13px; color: #791F1F; background: #fff; border-radius: 8px; padding: 10px 12px; border: 1px solid #F7C1C1; margin-bottom: 10px; line-height: 1.5; }
  .mlink { display: block; width: 100%; padding: 9px; text-align: center; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 13px; text-decoration: none; transition: background 0.15s; margin-bottom: 8px; }
  .mlink:hover { background: #f5f5f5; }
  .btn-saida { display: block; width: 100%; padding: 11px; text-align: center; border: none; border-radius: 8px; background: #E67817; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
  .btn-saida:hover { opacity: 0.88; }
  .btn-saida:disabled { opacity: 0.45; cursor: not-allowed; }
  .loading { text-align: center; padding: 1.5rem; color: #888; font-size: 14px; }
  .err { color: #A32D2D; font-size: 13px; padding: 10px 12px; background: #FCEBEB; border-radius: 8px; }
  .hist { margin-top: 6px; }
  .htitle { font-size: 12px; font-weight: 600; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .hitem { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
  .hitem:last-child { border-bottom: none; }
  .hdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .hdot.ok { background: #639922; }
  .hdot.no { background: #E24B4A; }
  .haddr { flex: 1; color: #1a1a1a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hts { color: #888; font-size: 11px; }
  .section-divider { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .section-title { font-size: 13px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 8px; }
  .section-title .count-badge { background: #E67817; color: #fff; font-size: 11px; border-radius: 20px; padding: 1px 8px; }
  .btn-reset { padding: 5px 12px; border: 1px solid #ddd; border-radius: 20px; background: #fff; color: #888; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-reset:hover { border-color: #A32D2D; color: #A32D2D; }
  .delivery-card { border: 1px solid #eee; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; background: #fff; transition: box-shadow 0.15s; }
  .delivery-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .dc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .dc-addr { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; padding-right: 8px; }
  .dc-status { font-size: 11px; border-radius: 20px; padding: 2px 9px; white-space: nowrap; font-weight: 600; }
  .dc-date { font-size: 11px; color: #aaa; margin-bottom: 8px; }
  .status-em-curso { background: #FFF3E0; color: #E67817; border: 1px solid #F7C785; }
  .status-entregue { background: #eaf3de; color: #3B6D11; border: 1px solid #C0DD97; }
  .dc-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .dc-meta-item { font-size: 11px; }
  .dc-meta-label { color: #888; margin-bottom: 1px; }
  .dc-meta-val { font-weight: 600; color: #1a1a1a; font-size: 12px; }
  .dc-desvio-pos { color: #A32D2D; }
  .dc-desvio-neg { color: #3B6D11; }
  .btn-chegada { width: 100%; padding: 9px; border: none; border-radius: 8px; background: #3B6D11; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-chegada:hover { opacity: 0.88; }
  .btn-chegada:disabled { opacity: 0.45; cursor: not-allowed; }
  .summary-box { background: #f9f9f9; border-radius: 10px; padding: 12px 14px; margin-top: 12px; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .summary-item { text-align: center; }
  .summary-label { font-size: 11px; color: #888; margin-bottom: 2px; }
  .summary-val { font-size: 18px; font-weight: 700; color: #1a1a1a; }
  .summary-val.orange { color: #E67817; }
  .empty-state { text-align: center; padding: 1.5rem 1rem; color: #bbb; font-size: 13px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 320px; text-align: center; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-cancelar { background: #f5f5f5; color: #666; }
  .btn-confirmar { background: #A32D2D; color: #fff; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-bar">
      <span class="dot" style="background:#DA251C"></span>
      <span class="brand">Os Grelhados dos Reis</span>
      <span class="dot" style="background:#E67817"></span>
    </div>
    <div class="subtitle">Validador de entregas</div>
  </div>

  <div class="store-tabs">
    <div class="tab active" onclick="sel(0)">Parede</div>
    <div class="tab" onclick="sel(1)">Carcavelos</div>
    <div class="tab" onclick="sel(2)">S. D. Rana</div>
  </div>

  <div class="scard" id="scard"></div>

  <label class="field-label">Morada ou código postal do cliente</label>
  <div class="input-row">
    <input class="addr" id="ain" placeholder="Ex: 2765-086 ou Rua das Flores 12, Cascais" onkeydown="if(event.key==='Enter')go()"/>
    <button class="btn" id="gbtn" onclick="go()">Verificar</button>
  </div>

  <div id="rarea"></div>
  <div id="harea"></div>

  <hr class="section-divider">
  <div class="section-header">
    <div class="section-title">
      🛵 Entregas do dia
      <span class="count-badge" id="count-badge">0</span>
    </div>
    <button class="btn-reset" onclick="confirmarReset()">↺ Novo dia</button>
  </div>
  <div id="deliveries-area"><div class="empty-state">Nenhuma entrega registada hoje</div></div>
  <div id="summary-area"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Iniciar novo dia?</h3>
    <p>Todos os registos actuais serão apagados da app. Os dados já gravados na Google Sheet mantêm-se.</p>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirmar" onclick="resetDia()">Confirmar</button>
    </div>
  </div>
</div>

<script>
const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjViMmMwYTBlNDJjNTQ3NjI4MTI0ODYwNTYwODVjYTM2IiwiaCI6Im11cm11cjY0In0=';
const GKEY = 'AIzaSyBuy18y21jYO0BamdcFVxMprg7gc_DilyQ';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkOFV8zsCSq8BhUQ50F1SA2nZK79OVTBFcIXQqDEz6f3hcVQlWSaAbzvWElIn_7nhY/exec';

// Serviço esperado = (ida × 2) + 5 min
// Desvio > 0 = atrasado (vermelho), Desvio ≤ 0 = dentro do esperado (verde)
const SERVICO_EXTRA = 5;

const STORES = [
  { name:'Parede', addrShort:'Largo José Fontana 66, Parede', addrFull:'Largo José Fontana 66, 2775-086 Parede, Cascais, Portugal', lat:38.692863, lng:-9.354782, schedule:'Seg-Sáb: 11:00-14:30 / 18:00-21:30 · Dom: Encerrado', closedDays:[0], lunch:['11:00','14:30'], dinner:['18:00','21:30'] },
  { name:'Carcavelos', addrShort:'Av. de São Miguel 296, Carcavelos', addrFull:'Avenida de São Miguel 296, 2775-751 Carcavelos, Cascais, Portugal', lat:38.7020161, lng:-9.3350118, schedule:'Seg-Sex: 11:00-14:00 / 17:30-21:00 · Sáb: 11:00-14:30 · Dom: Encerrado', closedDays:[0], lunch:['11:00','14:00'], dinner:['17:30','21:00'] },
  { name:'S. Domingos de Rana', addrShort:'Praça de Azurite 380A, S. D. Rana', addrFull:'Praça de Azurite 380, 2785-812 São Domingos de Rana, Cascais, Portugal', lat:38.7106936, lng:-9.3277964, schedule:'Ter-Sex: 11:00-14:00 / 18:00-21:00 · Seg/Sáb/Dom: Encerrado', closedDays:[0,1,6], lunch:['11:00','14:00'], dinner:['18:00','21:00'] }
];

let cur = 0, hist = [], deliveries = [];

function toMin(t){ const [h,m]=t.split(':'); return +h*60+ +m; }
function isOpen(s){ const n=new Date(), d=n.getDay(); if(s.closedDays.includes(d)) return false; const hm=n.getHours()*60+n.getMinutes(); return (hm>=toMin(s.lunch[0])&&hm<=toMin(s.lunch[1]))||(hm>=toMin(s.dinner[0])&&hm<=toMin(s.dinner[1])); }
function nowISO(){ return new Date().toISOString(); }
function nowHM(){ return new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function servicoEsperado(ida){ return (ida * 2) + SERVICO_EXTRA; }
function dataFormatada(iso){ return new Date(iso).toLocaleDateString('pt-PT',{weekday:'short',day:'2-digit',month:'2-digit'}); }

function confirmarReset(){ document.getElementById('modal').classList.add('active'); }
function fecharModal(){ document.getElementById('modal').classList.remove('active'); }
function resetDia(){
  deliveries=[]; hist=[];
  saveLocal();
  fecharModal();
  document.getElementById('rarea').innerHTML='';
  document.getElementById('harea').innerHTML='';
  document.getElementById('ain').value='';
  renderDeliveries();
}

function renderCard(){
  const s=STORES[cur], op=isOpen(s);
  document.getElementById('scard').innerHTML=`<strong>${s.name}</strong><span class="badge ${op?'open':'closed'}">${op?'Aberto':'Fechado'}</span><br>${s.addrShort}<br><span style="font-size:11px">${s.schedule}</span>`;
}
function sel(i){
  cur=i;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.className='tab'+(idx===i?' active':''));
  renderCard();
  document.getElementById('rarea').innerHTML='';
  document.getElementById('ain').value='';
}

async function geocode(query){
  const q=encodeURIComponent(query+(query.toLowerCase().includes('portugal')?'':', Portugal'));
  const url=`https://corsproxy.io/?url=${encodeURIComponent('https://maps.googleapis.com/maps/api/geocode/json?address='+q+'&region=pt&key='+GKEY)}`;
  const r=await fetch(url); const d=await r.json();
  if(d.status!=='OK'||!d.results.length) return null;
  const res=d.results[0];
  return {lat:res.geometry.location.lat,lng:res.geometry.location.lng,label:res.formatted_address};
}
async function getRoute(fromLng,fromLat,toLng,toLat){
  const url=`https://corsproxy.io/?url=${encodeURIComponent('https://api.openrouteservice.org/v2/directions/driving-car')}`;
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':ORS_KEY},body:JSON.stringify({coordinates:[[fromLng,fromLat],[toLng,toLat]]})});
  const d=await r.json();
  if(!d.routes||!d.routes.length) return null;
  return {distM:d.routes[0].summary.distance,durSec:d.routes[0].summary.duration};
}

async function go(){
  const input=document.getElementById('ain').value.trim();
  if(!input) return;
  const btn=document.getElementById('gbtn');
  btn.disabled=true;
  document.getElementById('rarea').innerHTML='<div class="loading">A calcular rota em tempo real...</div>';
  try {
    const store=STORES[cur];
    const dest=await geocode(input);
    if(!dest){ document.getElementById('rarea').innerHTML='<div class="err">Morada não encontrada. Tente incluir a localidade.</div>'; btn.disabled=false; return; }
    const route=await getRoute(store.lng,store.lat,dest.lng,dest.lat);
    if(!route){ document.getElementById('rarea').innerHTML='<div class="err">Não foi possível calcular a rota. Tente novamente.</div>'; btn.disabled=false; return; }
    const distKm=(route.distM/1000).toFixed(1);
    const durOW=Math.ceil(route.durSec/60);
    const durRT=durOW*2;
    const ok=durRT<=20;
    const mapsUrl=`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(store.addrFull)}&destination=${dest.lat},${dest.lng}&travelmode=driving`;
    hist.unshift({addr:dest.label.split(',').slice(0,2).join(','),ok,ts:nowHM()});
    if(hist.length>6) hist.pop();
    renderResult(dest,distKm,durOW,durRT,ok,mapsUrl,store);
    renderHist();
  } catch(e){
    document.getElementById('rarea').innerHTML='<div class="err">Erro de ligação. Verifique a internet e tente novamente.</div>';
  }
  btn.disabled=false;
}

function renderResult(dest,dist,ow,rt,ok,murl,store){
  const fee=ok?`<div class="fee-row"><span class="fee-l">Taxa de entrega (IVA incl.)</span><span class="fee-v">2,50 €</span></div>`:'';
  const note=ok?'':`<div class="rnote">Informar o cliente: "Lamentamos, mas a sua morada está fora da nossa zona de entrega. Pode recolher na loja ou encomendar via plataforma."</div>`;
  const moradaEsc=dest.label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const murlEsc=murl.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const saidaBtn=ok?`<button class="btn-saida" id="btn-saida-main" onclick="registarSaida(this,'${moradaEsc}',${ow},'${store.name}','${murlEsc}')">🛵 Saí para entrega</button>`:'';
  document.getElementById('rarea').innerHTML=`
    <div class="result ${ok?'r-ok':'r-no'}">
      <div class="r-title">${ok?'✓ Entrega aceite':'✕ Fora do raio de entrega'}</div>
      <div class="r-sub">${dest.label}</div>
      <div class="stats">
        <div class="stat"><div class="slabel">Distância</div><div class="sval">${dist} km</div></div>
        <div class="stat"><div class="slabel">Ida</div><div class="sval">${ow} min</div></div>
        <div class="stat"><div class="slabel">Ida + volta</div><div class="sval" style="color:${ok?'#3B6D11':'#A32D2D'}">${rt} min</div></div>
      </div>
      ${fee}${note}
      <a class="mlink" href="${murl}" target="_blank">Ver rota no Google Maps ↗</a>
      ${saidaBtn}
    </div>`;
}

async function registarSaida(btn,morada,ida,loja,murl){
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>A registar...';
  const id=uid(), hora_saida=nowISO(), esperado=servicoEsperado(ida);
  try {
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'saida',id,loja,morada,ida,esperado,hora_saida})});
  } catch(e){}
  deliveries.unshift({id,loja,morada,ida,esperado,hora_saida,hora_chegada:null,real:null,murl});
  saveLocal();
  renderDeliveries();
  const btnEl=document.getElementById('btn-saida-main');
  if(btnEl) btnEl.outerHTML=`<div style="text-align:center;font-size:13px;color:#3B6D11;font-weight:600;padding:8px 0;">✓ Saída registada às ${nowHM()}</div>`;
}

async function registarChegada(id,btn){
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>A registar...';
  const hora_chegada=nowISO();
  try {
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'chegada',id,hora_chegada})});
  } catch(e){}
  const d=deliveries.find(x=>x.id===id);
  if(d){
    d.hora_chegada=hora_chegada;
    d.real=Math.round((new Date(hora_chegada)-new Date(d.hora_saida))/60000);
  }
  saveLocal();
  renderDeliveries();
}

function saveLocal(){
  try { localStorage.setItem('ogr_deliveries',JSON.stringify(deliveries)); } catch(e){}
}
function loadLocal(){
  try {
    const raw=localStorage.getItem('ogr_deliveries');
    if(!raw) return;
    const all=JSON.parse(raw);
    const hoje=new Date().toDateString();
    deliveries=all.filter(d=>d.hora_saida&&d.esperado&&new Date(d.hora_saida).toDateString()===hoje);
  } catch(e){}
}

function renderDeliveries(){
  const area=document.getElementById('deliveries-area');
  document.getElementById('count-badge').textContent=deliveries.length;
  if(!deliveries.length){
    area.innerHTML='<div class="empty-state">Nenhuma entrega registada hoje</div>';
    document.getElementById('summary-area').innerHTML='';
    return;
  }
  area.innerHTML=deliveries.map(d=>{
    const emCurso=!d.hora_chegada;
    const horaSaida=new Date(d.hora_saida).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
    const horaChegada=d.hora_chegada?new Date(d.hora_chegada).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}):'—';
    const dataEntrega=dataFormatada(d.hora_saida);

    let desvioHtml='<span style="color:#bbb">—</span>';
    if(d.real!==null){
      const dev=d.real-d.esperado;
      const sign=dev>0?'+':'';
      if(dev<=0){
        desvioHtml=`<span class="dc-desvio-neg">${sign}${dev} min ✓</span>`;
      } else {
        desvioHtml=`<span class="dc-desvio-pos">+${dev} min ⚠</span>`;
      }
    }

    const chegadaBtn=emCurso?`<button class="btn-chegada" onclick="registarChegada('${d.id}',this)">✓ Regressei à loja</button>`:'';
    const enderecoShort=d.morada.split(',').slice(0,2).join(',');

    return `
      <div class="delivery-card">
        <div class="dc-header">
          <div class="dc-addr">${enderecoShort}</div>
          <div class="dc-status ${emCurso?'status-em-curso':'status-entregue'}">${emCurso?'Em curso':'Concluída'}</div>
        </div>
        <div class="dc-date">📅 ${dataEntrega} · ${d.loja}</div>
        <div class="dc-meta">
          <div class="dc-meta-item"><div class="dc-meta-label">Saída</div><div class="dc-meta-val">${horaSaida}</div></div>
          <div class="dc-meta-item"><div class="dc-meta-label">Regresso</div><div class="dc-meta-val">${horaChegada}</div></div>
          <div class="dc-meta-item"><div class="dc-meta-label">Ida (ORS)</div><div class="dc-meta-val">${d.ida} min</div></div>
          <div class="dc-meta-item"><div class="dc-meta-label">Serviço esperado</div><div class="dc-meta-val">${d.esperado} min</div></div>
          <div class="dc-meta-item"><div class="dc-meta-label">Real (total)</div><div class="dc-meta-val">${d.real!==null?d.real+' min':'—'}</div></div>
          <div class="dc-meta-item"><div class="dc-meta-label">Desvio</div><div class="dc-meta-val">${desvioHtml}</div></div>
        </div>
        ${chegadaBtn}
      </div>`;
  }).join('');
  renderSummary();
}

function renderSummary(){
  const concluidas=deliveries.filter(d=>d.real!==null);
  if(!concluidas.length){ document.getElementById('summary-area').innerHTML=''; return; }
  const mediaReal=Math.round(concluidas.reduce((s,d)=>s+d.real,0)/concluidas.length);
  const mediaEsp=Math.round(concluidas.reduce((s,d)=>s+d.esperado,0)/concluidas.length);
  const mediaDesvio=Math.round(concluidas.reduce((s,d)=>s+(d.real-d.esperado),0)/concluidas.length);
  const sign=mediaDesvio>0?'+':'';
  const desvioColor=mediaDesvio>0?'#A32D2D':'#3B6D11';
  document.getElementById('summary-area').innerHTML=`
    <div class="summary-box">
      <div class="htitle" style="margin-bottom:10px">Resumo do dia — ${concluidas.length} entrega${concluidas.length>1?'s':''} concluída${concluidas.length>1?'s':''}</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="summary-label">Serviço esperado médio</div><div class="summary-val">${mediaEsp} min</div></div>
        <div class="summary-item"><div class="summary-label">Tempo real médio</div><div class="summary-val orange">${mediaReal} min</div></div>
        <div class="summary-item"><div class="summary-label">Desvio médio</div><div class="summary-val" style="color:${desvioColor}">${sign}${mediaDesvio} min</div></div>
      </div>
    </div>`;
}

function renderHist(){
  if(!hist.length){ document.getElementById('harea').innerHTML=''; return; }
  document.getElementById('harea').innerHTML=`<div class="hist" style="margin-bottom:0.5rem"><div class="htitle">Consultas recentes</div>${hist.map(h=>`<div class="hitem"><div class="hdot ${h.ok?'ok':'no'}"></div><div class="haddr">${h.addr}</div><div class="hts">${h.ts}</div></div>`).join('')}</div>`;
}

loadLocal();
renderCard();
renderDeliveries();
</script>
</body>
</html>
